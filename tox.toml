env_list = ["3.13", "3.14", "lint"]

[env_run_base]
description = "run the test suite with pytest"
deps = [ "-rrequirements-dev.txt", ]
commands = [["pytest", { replace = "posargs", default = ["tests"], extend = true }]]

[env.lint]
description = "run linters"
skip_install = true
deps = [ "-rrequirements-dev.txt", ]
commands = [["black", "src", "tests"]]
